<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
  <div
    *ngFor="let metric of metrics"
    class="bg-white/30 dark:bg-slate-800/40 backdrop-blur-lg border border-white/20 text-black dark:text-white p-5 rounded-xl hover:scale-105 hover:shadow-2xl transition-all duration-300"
  >
    <h3 class="text-gray-600 dark:text-gray-300 text-sm">{{ metric.title }}</h3>
    <p class="text-2xl font-bold mt-2">{{ metric.value }}</p>
  </div>
</div>
