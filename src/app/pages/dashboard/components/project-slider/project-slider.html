<div class="relative bg-white/30 dark:bg-slate-800/40 backdrop-blur-lg border border-white/20 p-5 rounded-xl shadow">
  <h2 class="text-xl font-semibold mb-6 text-black dark:text-white">Project Portfolio</h2>

  <div class="flex justify-between mb-4">
    <button
      (click)="prev()"
      aria-label="Show previous projects"
      class="px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition disabled:opacity-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-400"
      [disabled]="currentIndex === 0"
    >
      ◀ Previous
    </button>
    <button
      (click)="next()"
      aria-label="Show next projects"
      class="px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition disabled:opacity-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-400"
      [disabled]="currentIndex + visibleCount >= projects.length"
    >
      Next ▶
    </button>
  </div>

  <div class="overflow-hidden" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
    <div class="flex gap-6 transition-transform duration-500 ease-in-out" [style.transform]="'translateX(' + translateX + ')'">
      <div
        *ngFor="let project of projects"
        class="min-w-full md:min-w-[calc(100%/2)] lg:min-w-[calc(100%/3)] bg-white/20 dark:bg-slate-800/40 backdrop-blur-lg border border-white/20 p-5 rounded-xl"
      >
        <h3 class="text-lg font-semibold text-black dark:text-white">{{ project.name }}</h3>

        <p class="text-gray-600 dark:text-gray-300 text-sm mt-2">{{ project.description }}</p>

        <p class="text-sm mt-3 text-blue-500 dark:text-blue-400 flex flex-wrap gap-1">
          <span *ngFor="let tech of project.tech" class="bg-blue-500/20 px-2 py-1 rounded">{{ tech }}</span>
        </p>

        <p class="text-xs text-gray-500 mt-2">Architecture: {{ project.architecture }}</p>

        <div class="flex gap-3 mt-3" *ngIf="project.github || project.demo">
          <a
            *ngIf="project.github"
            [href]="project.github"
            target="_blank"
            rel="noopener"
            class="text-sm bg-slate-700 text-white px-3 py-1 rounded"
            >GitHub</a
          >
          <a
            *ngIf="project.demo"
            [href]="project.demo"
            target="_blank"
            rel="noopener"
            class="text-sm bg-indigo-600 text-white px-3 py-1 rounded"
            >Live Demo</a
          >
        </div>
      </div>
    </div>
  </div>
</div>
