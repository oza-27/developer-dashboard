<div class="bg-white/30 dark:bg-slate-800/40 backdrop-blur-lg border border-white/20 text-black dark:text-white p-5 rounded-xl transition-all duration-300">
  <h2 class="text-xl font-semibold mb-5">Career Timeline</h2>
  <div class="space-y-4">
    <div *ngFor="let item of timeline" class="border-l-2 border-indigo-400 pl-4">
      <p class="text-indigo-500 font-semibold">{{ item.year }}</p>
      <h3 class="font-semibold">{{ item.title }}</h3>
      <p class="text-sm text-gray-600 dark:text-gray-300">{{ item.description }}</p>
    </div>
  </div>
</div>
